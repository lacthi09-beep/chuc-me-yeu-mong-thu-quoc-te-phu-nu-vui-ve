<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gửi mẹ yêu ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ffd6e7,#fff0f5);
text-align:center;
padding:40px;
}

h1{
color:#e91e63;
font-size:42px;
}

.message{
font-size:20px;
margin-bottom:30px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
border-radius:15px;
width:250px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

.text{
margin-top:10px;
font-size:16px;
color:#444;
}

footer{
margin-top:40px;
font-size:18px;
color:#e91e63;
}

</style>
</head>

<body>

<h1>💐 Chúc mừng ngày 8/3 mẹ 💐</h1>

<p class="message">
Cảm ơn mẹ vì luôn yêu thương và chăm sóc con ❤️  
Con chúc mẹ luôn vui vẻ và thật nhiều sức khỏe.
</p>

<div class="gallery">

<div class="card">
<img src="me1.jpg">
<div class="text">Mẹ luôn là người tuyệt vời nhất với con</div>
</div>

<div class="card">
<img src="me2.jpg">
<div class="text">Cảm ơn mẹ vì đã luôn bên con</div>
</div>

<div class="card">
<img src="me3.jpg">
<div class="text">Con mong mẹ luôn hạnh phúc</div>
</div>

</div>

<footer>
Con yêu mẹ rất nhiều ❤️
</footer>

</body>
</html>
